<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Typographic Creature Lab</title>
</head>
<body>

<div id="ui">
  <div id="hint">START TYPING TO SPAWN CREATURES</div>
  <div id="hud">
    <div class="hrow">POPULATION &nbsp;<span id="hpop">0</span></div>
    <div class="hrow">SPAWNED &nbsp;<span id="hspawn">0</span></div>
    <div class="hrow">EXTINCT &nbsp;<span id="hdead">0</span></div>
  </div>
  <div id="terminal">
    <input
      id="hidden-input"
      type="text"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
      aria-label="Type to spawn creatures"
    />
    <span id="prompt">&gt;&nbsp;SEQUENCE_</span>
    <div id="seq"><span id="caret"></span></div>
  </div>
  <div id="tooltip"></div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
