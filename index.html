<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Typographic Creature Lab</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #04040a;
      overflow: hidden;
      font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
    }
    canvas {
      position: fixed;
      top: 0; left: 0;
      z-index: 1;
    }
    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    /* ── Hint ── */
    #hint {
      position: absolute;
      top: 26px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(140, 210, 255, 0.25);
      font-size: 11px;
      letter-spacing: 0.28em;
      white-space: nowrap;
      transition: opacity 1.4s ease;
    }

    /* ── HUD ── */
    #hud {
      position: absolute;
      top: 22px;
      right: 26px;
      text-align: right;
      line-height: 1.9;
    }
    .hrow {
      font-size: 10px;
      letter-spacing: 0.13em;
      color: rgba(80, 210, 160, 0.3);
    }
    .hrow span {
      color: rgba(80, 210, 160, 0.7);
    }

    /* ── Terminal ── */
    #terminal {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      pointer-events: auto;
      padding: 13px 28px 15px;
      background: rgba(4, 4, 12, 0.9);
      border-top: 1px solid rgba(70, 190, 150, 0.1);
      display: flex;
      align-items: center;
      gap: 14px;
      min-height: 56px;
    }
    #prompt {
      color: rgba(70, 200, 150, 0.5);
      font-size: 11px;
      letter-spacing: 0.14em;
      flex-shrink: 0;
      user-select: none;
    }
    #seq {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0;
      font-size: 14px;
      letter-spacing: 0.14em;
      min-height: 22px;
    }
    .ct { display: inline-block; }
    #caret {
      display: inline-block;
      width: 8px; height: 16px;
      background: rgba(70, 200, 150, 0.75);
      vertical-align: middle;
      margin-left: 1px;
      animation: blink 1.1s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── Creature tooltip ── */
    #tooltip {
      position: absolute;
      padding: 8px 12px;
      background: rgba(4,4,14,0.88);
      border: 1px solid rgba(80,200,160,0.15);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: rgba(160,230,200,0.7);
      line-height: 1.7;
      pointer-events: none;
      display: none;
    }
  </style>
</head>
<body>

<div id="ui">
  <div id="hint">START TYPING TO SPAWN CREATURES</div>
  <div id="hud">
    <div class="hrow">POPULATION &nbsp;<span id="hpop">0</span></div>
    <div class="hrow">SPAWNED &nbsp;<span id="hspawn">0</span></div>
    <div class="hrow">EXTINCT &nbsp;<span id="hdead">0</span></div>
  </div>
  <div id="terminal">
    <span id="prompt">&gt;&nbsp;SEQUENCE_</span>
    <div id="seq"><span id="caret"></span></div>
  </div>
  <div id="tooltip"></div>
</div>

<script>
// ================================================================
//  TYPOGRAPHIC CREATURE LAB  —  Phase 1: Foundation
// ================================================================

// ── Seeded RNG (xorshift-based) ──────────────────────────────────
function makeRNG(seed) {
  let s = (seed ^ 0xdeadbeef) >>> 0;
  return () => {
    s ^= s << 13; s ^= s >>> 17; s ^= s << 5;
    return (s >>> 0) / 4294967296;
  };
}

// ── Character → DNA ─────────────────────────────────────────────
const FAMILIES = {
  vowel:     { chars: 'aeiouAEIOU', sizeBase: 11, speedBase: 1.9,  glowMult: 1.5 },
  apex:      { chars: 'qxzQXZ',     sizeBase: 21, speedBase: 2.9,  glowMult: 2.2 },
  scavenger: { chars: '0123456789', sizeBase: 9,  speedBase: 0.75, glowMult: 1.2 },
  titan:     { chars: 'BCDFGHJKLMNPRSTUVWY', sizeBase: 33, speedBase: 0.35, glowMult: 2.8 },
  consonant: { chars: '',           sizeBase: 15, speedBase: 1.15, glowMult: 1.7 },
};

function getFamily(char) {
  for (const [name, f] of Object.entries(FAMILIES)) {
    if (f.chars.includes(char)) return name;
  }
  return 'consonant';
}

function buildDNA(char, spawnIndex) {
  const code  = char.charCodeAt(0);
  const seed  = Math.imul(code, 2654435761) ^ Math.imul(spawnIndex, 1234567891);
  const r     = makeRNG(seed >>> 0);
  const family = getFamily(char);
  const F     = FAMILIES[family];

  return {
    char, code, seed, family,
    hue:   (code * 53 + 60) % 360,
    sat:   65  + r() * 30,
    lit:   52  + r() * 26,
    size:  F.sizeBase + r() * 10,
    speed: F.speedBase + r() * 0.9,
    turnRate:    0.022 + r() * 0.065,
    numVerts:    8 + Math.floor(r() * 6),
    bodyType:    Math.floor(r() * 3),        // 0=smooth blob, 1=hard poly, 2=spiky
    deformAmp:   0.08 + r() * 0.3,
    numLegs:     Math.floor(r() * 5),        // 0–4
    legStyle:    Math.floor(r() * 3),        // 0=jointed, 1=fin, 2=tentacle
    legPhase:    r() * Math.PI * 2,
    numEyes:     family === 'apex' ? 3 : (family === 'titan' ? 1 : 1 + Math.floor(r() * 2)),
    eyeColor:    (code * 29 + 180) % 360,
    glowMult:    F.glowMult + r() * 0.6,
    noiseOff:    r() * 2000,
    noiseScale:  0.0018 + r() * 0.0028,
    bodyStretch: 1.1 + r() * 0.45,          // elongation along heading
  };
}

// ── Particle (death/birth debris) ───────────────────────────────
class Particle {
  constructor(x, y, hue, sat, lit, maxSize) {
    const a = Math.random() * Math.PI * 2;
    const v = 0.8 + Math.random() * 3.5;
    this.x = x; this.y = y;
    this.vx = Math.cos(a) * v; this.vy = Math.sin(a) * v;
    this.r = maxSize * (0.12 + Math.random() * 0.22);
    this.life = 1;
    this.decay = 0.038 + Math.random() * 0.02;
    this.hue = hue; this.sat = sat; this.lit = lit + 18;
  }
  step() {
    this.x += this.vx; this.y += this.vy;
    this.vx *= 0.9; this.vy *= 0.9;
    this.life -= this.decay;
  }
  get dead() { return this.life <= 0; }
}

// ── Creature ─────────────────────────────────────────────────────
let _noise = () => 0.5; // set by p5 after setup

class Creature {
  constructor(char, index) {
    this.id = index;
    this.dna = buildDNA(char, index);
    // Spawn in canvas area (above terminal, padded from edges)
    const pad = this.dna.size * 2 + 30;
    const maxY = _H() - 140;
    this.x = pad + Math.random() * (_W() - pad * 2);
    this.y = pad + Math.random() * (maxY - pad * 2);
    this.vx = 0; this.vy = 0;
    this.heading    = Math.random() * Math.PI * 2;
    this.targetH    = this.heading;
    this.noiseT     = this.dna.noiseOff;
    this.age        = 0;
    this.spawnT     = 0;   // 0→1 birth scale
    this.alive      = true;
    this.dying      = false;
    this.dyingT     = 0;   // 0→1 death
    this.particles  = [];
    this.hovered    = false;
  }

  // Called on backspace / death
  kill() {
    if (this.dying) return;
    this.dying = true;
    const { x, y, dna } = this;
    for (let i = 0; i < 16; i++)
      this.particles.push(new Particle(x, y, dna.hue, dna.sat, dna.lit, dna.size));
  }

  update() {
    if (!this.alive) return;

    // Birth scale
    this.spawnT = Math.min(1, this.spawnT + 0.05);

    // Death
    if (this.dying) {
      this.dyingT = Math.min(1, this.dyingT + 0.038);
      this.particles = this.particles.filter(p => { p.step(); return !p.dead; });
      if (this.dyingT >= 1 && this.particles.length === 0) this.alive = false;
      return;
    }

    this.age++;
    this.noiseT += 0.0038;

    // Perlin-noise heading target
    const nx = _noise(this.x * this.dna.noiseScale + this.noiseT,
                      this.y * this.dna.noiseScale);
    const ny = _noise(this.x * this.dna.noiseScale,
                      this.y * this.dna.noiseScale + this.noiseT + 100);
    this.targetH += ((nx - 0.5) * 0.42 + (ny - 0.5) * 0.2) * this.dna.turnRate * 6;

    // Smooth heading interpolation
    let d = this.targetH - this.heading;
    d = ((d + Math.PI) % (Math.PI * 2)) - Math.PI;
    this.heading += d * 0.07;

    this.x += Math.cos(this.heading) * this.dna.speed;
    this.y += Math.sin(this.heading) * this.dna.speed;

    // Edge bounce
    const m    = this.dna.size * 1.8;
    const maxY = _H() - 130;
    if (this.x < m)         { this.x = m;         this.targetH = 0; }
    if (this.x > _W() - m)  { this.x = _W() - m;  this.targetH = Math.PI; }
    if (this.y < m)         { this.y = m;         this.targetH = Math.PI * 0.5; }
    if (this.y > maxY - m)  { this.y = maxY - m;  this.targetH = -Math.PI * 0.5; }
  }

  draw(p) {
    if (!this.alive) return;
    const { dna, age, x, y, heading, spawnT, dying, dyingT } = this;

    // Alpha / scale driven by birth & death
    const scl  = spawnT * (dying ? Math.pow(1 - dyingT, 0.6) : 1);
    const alph = spawnT * (dying ? (1 - dyingT) : 1);
    if (alph < 0.01) return;

    // Death particles (world-space)
    for (const pt of this.particles) {
      p.noStroke();
      p.fill(pt.hue, pt.sat, pt.lit, pt.life * 0.75);
      p.ellipse(pt.x, pt.y, pt.r * pt.life * 2);
    }

    const s = dna.size * scl;

    p.push();
    p.translate(x, y);
    p.rotate(heading + Math.PI * 0.5);

    // ── Glow (four radial passes) ──────────────────────────────
    p.noStroke();
    const gr = s * dna.glowMult;
    p.fill(dna.hue, dna.sat, dna.lit, alph * 0.035); p.ellipse(0,0, gr*3.0, gr*3.0);
    p.fill(dna.hue, dna.sat, dna.lit, alph * 0.055); p.ellipse(0,0, gr*2.0, gr*2.0);
    p.fill(dna.hue, dna.sat, dna.lit, alph * 0.09);  p.ellipse(0,0, gr*1.3, gr*1.3);
    p.fill(dna.hue, dna.sat, dna.lit, alph * 0.14);  p.ellipse(0,0, gr*0.85,gr*0.85);

    // ── Appendages (behind body) ───────────────────────────────
    this._drawAppendages(p, s, alph, age, dna);

    // ── Body ──────────────────────────────────────────────────
    p.fill(dna.hue, dna.sat, dna.lit, alph * 0.9);
    p.stroke(dna.hue, dna.sat, Math.min(95, dna.lit + 25), alph * 0.45);
    p.strokeWeight(0.9);

    const V   = dna.numVerts;
    const PTS = 52;
    p.beginShape();
    for (let i = 0; i < PTS; i++) {
      const ang = (i / PTS) * Math.PI * 2;
      let rx = s, ry = s * dna.bodyStretch;

      if (dna.bodyType === 0) {
        // Smooth blob: noise deformation
        const nd = _noise(
          Math.cos(ang) * 1.8 + dna.seed * 0.00001 + age * 0.006,
          Math.sin(ang) * 1.8
        );
        const def = 0.78 + dna.deformAmp * nd * 2.4;
        rx *= def; ry *= def;
      } else if (dna.bodyType === 1) {
        // Hard polygon: faceted
        const facet = Math.floor((ang / (Math.PI * 2)) * V);
        const t = (ang / (Math.PI * 2)) * V - facet;
        const snap = 0.5 + Math.abs(t - 0.5);
        rx *= snap; ry *= snap;
      } else {
        // Spiky: alternating spines
        const spine = i % 4 < 2;
        rx *= spine ? 1 + dna.deformAmp * 1.6 : 0.62;
        ry *= spine ? 1 + dna.deformAmp * 1.6 : 0.62;
      }

      p.vertex(rx * Math.cos(ang), ry * Math.sin(ang));
    }
    p.endShape(p.CLOSE);

    // ── Eyes ──────────────────────────────────────────────────
    this._drawEyes(p, s, alph, age, dna);

    p.pop();

    // Hover highlight ring
    if (this.hovered) {
      p.noFill();
      p.stroke(dna.hue, dna.sat, 90, 0.35);
      p.strokeWeight(1.2);
      p.ellipse(x, y, s * 3.5, s * 3.5);
    }
  }

  _drawAppendages(p, s, alph, age, dna) {
    if (dna.numLegs === 0) return;
    p.noFill();
    p.stroke(dna.hue, dna.sat, dna.lit + 12, alph * 0.6);
    p.strokeWeight(1.0);

    const half = Math.ceil(dna.numLegs / 2);
    for (let i = 0; i < dna.numLegs; i++) {
      const side  = i < half ? -1 : 1;
      const idx   = i < half ? i : i - half;
      const ay    = -s * 0.35 + idx * s * 0.42;
      const ax    = side * s * 0.68;
      const wave  = Math.sin(age * 0.14 + dna.legPhase + idx * 1.4) * 0.55;

      if (dna.legStyle === 0) {
        // Jointed legs
        const mx = ax + side * s * 0.88 * Math.cos(0.7 + wave);
        const my = ay + s  * 0.88 * Math.abs(Math.sin(0.7 + wave));
        const ex = mx + side * s * 0.52;
        const ey = my + s * 0.36;
        p.line(ax, ay, mx, my);
        p.line(mx, my, ex, ey);
      } else if (dna.legStyle === 1) {
        // Fins
        p.beginShape();
        p.curveVertex(ax,                   ay);
        p.curveVertex(ax + side * s * 0.4,  ay - s * 0.15);
        p.curveVertex(ax + side * s * 1.35, ay - s * 0.2 + wave * s * 0.45);
        p.curveVertex(ax + side * s * 1.0,  ay + s * 0.5);
        p.curveVertex(ax,                   ay + s * 0.12);
        p.endShape();
      } else {
        // Tentacles
        p.beginShape();
        for (let t = 0; t <= 8; t++) {
          const tt = t / 8;
          p.curveVertex(
            ax + side * s * 1.4 * tt,
            ay + tt * s * 1.2 + Math.sin(tt * Math.PI * 2.8 + age * 0.12 + idx + dna.legPhase) * s * 0.28 * tt
          );
        }
        p.endShape();
      }
    }
  }

  _drawEyes(p, s, alph, age, dna) {
    const eSz = s * 0.26;
    const spread = dna.numEyes === 1 ? 0 : s * 0.3;
    for (let i = 0; i < dna.numEyes; i++) {
      const off = dna.numEyes === 1 ? 0 : (i - (dna.numEyes - 1) / 2);
      const ex  = off * spread;
      const ey  = -s * dna.bodyStretch * 0.66;
      const drift = Math.sin(age * 0.042 + i * 2.3) * eSz * 0.22;

      // Sclera
      p.noStroke();
      p.fill(0, 0, 95, alph * 0.93);
      p.ellipse(ex, ey, eSz * 2.0, eSz * 1.55);

      // Iris
      p.fill(dna.eyeColor, 70, 40, alph * 0.95);
      p.ellipse(ex + drift, ey, eSz * 0.85, eSz * 0.85);

      // Pupil
      p.fill(0, 0, 8, alph);
      p.ellipse(ex + drift, ey, eSz * 0.45, eSz * 0.45);

      // Catchlight
      p.fill(0, 0, 100, alph * 0.8);
      p.ellipse(ex + drift + eSz * 0.2, ey - eSz * 0.22, eSz * 0.22, eSz * 0.22);
    }
  }

  // Distance sq to a point
  distSq(px, py) {
    const dx = this.x - px, dy = this.y - py;
    return dx * dx + dy * dy;
  }
}

// ── Trail System ────────────────────────────────────────────────
const TRAIL_LEN = 12;
const _trails = new Map();

function updateTrails(all) {
  for (const c of all) {
    if (c.dying || !c.alive) { _trails.delete(c); continue; }
    if (!_trails.has(c)) _trails.set(c, []);
    const t = _trails.get(c);
    t.push({ x: c.x, y: c.y });
    if (t.length > TRAIL_LEN) t.shift();
  }
  for (const [c] of _trails) if (!all.includes(c)) _trails.delete(c);
}

function drawTrails(p) {
  p.noFill();
  for (const [c, t] of _trails) {
    if (t.length < 2) continue;
    for (let i = 1; i < t.length; i++) {
      const ratio = i / t.length;
      p.stroke(c.dna.hue, c.dna.sat, c.dna.lit, ratio * 0.16);
      p.strokeWeight(c.dna.size * 0.2 * ratio);
      p.line(t[i-1].x, t[i-1].y, t[i].x, t[i].y);
    }
  }
}

// ── Helpers ─────────────────────────────────────────────────────
function _W() { return window._cw || window.innerWidth; }
function _H() { return window._ch || window.innerHeight; }

// ── Global State ────────────────────────────────────────────────
const creatures  = [];
const typed      = [];   // { char, dna, creature }
let spawnIdx     = 0;
let totalSpawned = 0;
let totalDead    = 0;
let hintVisible  = true;

// ── DOM ─────────────────────────────────────────────────────────
const seqEl     = document.getElementById('seq');
const caretEl   = document.getElementById('caret');
const hintEl    = document.getElementById('hint');
const popEl     = document.getElementById('hpop');
const spawnEl   = document.getElementById('hspawn');
const deadEl    = document.getElementById('hdead');
const tipEl     = document.getElementById('tooltip');

function rebuildSeq() {
  while (seqEl.firstChild) seqEl.removeChild(seqEl.firstChild);
  for (const e of typed) {
    const sp = document.createElement('span');
    sp.className = 'ct';
    sp.textContent = e.char === ' ' ? '\u00a0' : e.char;
    sp.style.color = `hsl(${e.dna.hue}, ${e.dna.sat}%, ${e.dna.lit}%)`;
    seqEl.appendChild(sp);
  }
  seqEl.appendChild(caretEl);
}

// ── Keyboard ────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  e.preventDefault();

  if (e.key === 'Backspace') {
    if (typed.length > 0) {
      const last = typed.pop();
      last.creature.kill();
      totalDead++;
    }
    rebuildSeq();
    return;
  }

  if (e.key.length !== 1) return;

  if (hintVisible) {
    hintEl.style.opacity = '0';
    hintVisible = false;
  }

  const c = new Creature(e.key, spawnIdx++);
  creatures.push(c);
  totalSpawned++;
  typed.push({ char: e.key, dna: c.dna, creature: c });
  rebuildSeq();
});

// ── Mouse hover for tooltip ──────────────────────────────────────
const FAMILY_LABELS = {
  vowel: 'Herd Animal', consonant: 'Wanderer',
  apex: 'Apex Predator', scavenger: 'Scavenger', titan: 'Titan'
};

document.addEventListener('mousemove', e => {
  const mx = e.clientX, my = e.clientY;
  let closest = null, bestDist = Infinity;

  for (const c of creatures) {
    if (!c.alive || c.dying) continue;
    const d = c.distSq(mx, my);
    const thresh = (c.dna.size * 2.5) ** 2;
    if (d < thresh && d < bestDist) { bestDist = d; closest = c; }
  }

  for (const c of creatures) c.hovered = (c === closest);

  if (closest) {
    const { dna } = closest;
    tipEl.style.display = 'block';
    tipEl.style.left = (mx + 18) + 'px';
    tipEl.style.top  = (my - 10) + 'px';
    tipEl.style.borderColor = `hsl(${dna.hue}, ${dna.sat}%, ${dna.lit}%, 0.3)`;
    tipEl.innerHTML =
      `CHAR &nbsp;&nbsp;<span style="color:hsl(${dna.hue},${dna.sat}%,${dna.lit}%);font-size:16px">${dna.char}</span><br>` +
      `FAMILY &nbsp;${FAMILY_LABELS[dna.family]}<br>` +
      `AGE &nbsp;&nbsp;&nbsp;&nbsp;${closest.age} ticks<br>` +
      `SPEED &nbsp;&nbsp;${dna.speed.toFixed(2)}<br>` +
      `EYES &nbsp;&nbsp;&nbsp;${dna.numEyes}`;
  } else {
    tipEl.style.display = 'none';
  }
});

// ── p5 Sketch ────────────────────────────────────────────────────
new p5(sk => {

  sk.setup = () => {
    const cnv = sk.createCanvas(sk.windowWidth, sk.windowHeight);
    cnv.style('position', 'fixed');
    cnv.style('top', '0'); cnv.style('left', '0');
    cnv.style('z-index', '1');
    sk.colorMode(sk.HSL, 360, 100, 100, 1);
    sk.smooth();
    // Expose p5 noise globally
    _noise = (x, y, z) => sk.noise(x, y ?? 0, z ?? 0);
    window._cw = sk.width;
    window._ch = sk.height;
  };

  sk.windowResized = () => {
    sk.resizeCanvas(sk.windowWidth, sk.windowHeight);
    window._cw = sk.width; window._ch = sk.height;
  };

  sk.draw = () => {
    // Soft motion-blur persistence
    sk.fill(240, 40, 2, 0.2);
    sk.noStroke();
    sk.rect(0, 0, sk.width, sk.height);

    updateTrails(creatures);
    drawTrails(sk);

    // Update + draw creatures; remove dead
    for (let i = creatures.length - 1; i >= 0; i--) {
      const c = creatures[i];
      c.update();
      c.draw(sk);
      if (!c.alive) creatures.splice(i, 1);
    }

    // Update HUD every 15 frames
    if (sk.frameCount % 15 === 0) {
      popEl.textContent   = creatures.filter(c => !c.dying).length;
      spawnEl.textContent = totalSpawned;
      deadEl.textContent  = totalDead;
    }
  };

});
</script>
</body>
</html>
